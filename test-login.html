<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试登录</title>
</head>
<body>
    <h1>测试登录功能</h1>
    <p>请输入管理员密码后测试（不会保存到本地存储）。</p>
    <label>
      密码：
      <input id="password" type="password" placeholder="请输入密码" />
    </label>
    <button onclick="testLogin()">开始测试</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            const passwordInput = document.getElementById('password');
            const password = passwordInput?.value?.trim();

            if (!password) {
                resultDiv.innerHTML = '<h2>❌ 请输入密码</h2>';
                return;
            }
            
            try {
                await fetch('http://localhost:3001/api/auth/csrf', {
                    method: 'GET',
                    credentials: 'include',
                });

                const response = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@inffinancems.com',
                        password
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h2>✅ 登录成功！</h2>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;

                    // 使用 httpOnly Cookie 测试访问受保护 API
                    testProtectedAPI();
                } else {
                    resultDiv.innerHTML = `
                        <h2>❌ 登录失败</h2>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>❌ 请求错误</h2>
                    <pre>${error.message}</pre>
                `;
            }
        }

        async function testProtectedAPI() {
            try {
                const response = await fetch('http://localhost:3001/api/auth/me', {
                    method: 'GET',
                    credentials: 'include',
                });

                const data = await response.json();
                
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML += `
                    <h2>✅ 受保护API访问成功！</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML += `
                    <h2>❌ 受保护API访问失败</h2>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
