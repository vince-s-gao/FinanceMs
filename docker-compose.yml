# InfFinanceMs - Docker Compose 配置

version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: inffinancems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inffinancems
      POSTGRES_PASSWORD: inffinancems123
      POSTGRES_DB: inffinancems
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inffinancems"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存（可选，后续优化使用）
  redis:
    image: redis:7-alpine
    container_name: inffinancems-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: inffinancems-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://inffinancems:inffinancems123@postgres:5432/inffinancems
      - JWT_SECRET=your-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=7d
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 Web
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: inffinancems-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
